input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json_lines
  }
  udp {
    port => 5001
    codec => json
  }
}

filter {
  # Parse application logs
  if [fields][service] == "currentdao-backend" {
    json {
      source => "message"
    }
    
    # Parse timestamp
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
    
    # Add service information
    mutate {
      add_field => { "service_name" => "currentdao-backend" }
      add_field => { "environment" => "%{[fields][environment]}" }
    }
    
    # Parse log level
    if [level] {
      mutate {
        add_field => { "log_level" => "%{level}" }
      }
    }
    
    # Extract request information if present
    if [request] {
      mutate {
        add_field => { "request_id" => "%{[request][id]}" }
        add_field => { "request_method" => "%{[request][method]}" }
        add_field => { "request_url" => "%{[request][url]}" }
        add_field => { "request_user_agent" => "%{[request][userAgent]}" }
      }
    }
    
    # Extract error information if present
    if [error] {
      mutate {
        add_field => { "error_name" => "%{[error][name]}" }
        add_field => { "error_message" => "%{[error][message]}" }
        add_field => { "error_stack" => "%{[error][stack]}" }
      }
    }
    
    # Extract performance metrics
    if [performance] {
      mutate {
        add_field => { "response_time" => "%{[performance][responseTime]}" }
        add_field => { "memory_usage" => "%{[performance][memoryUsage]}" }
        add_field => { "cpu_usage" => "%{[performance][cpuUsage]}" }
      }
    }
  }
  
  # Parse system logs
  if [fields][logtype] == "system" {
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{GREEDYDATA:message}" 
      }
    }
  }
  
  # Parse access logs
  if [fields][logtype] == "access" {
    grok {
      match => { 
        "message" => "%{COMBINEDAPACHELOG}" 
      }
    }
    
    # Parse response time
    if [response] {
      mutate {
        convert => { "response" => "integer" }
        add_field => { "response_time_ms" => "%{response}" }
      }
    }
  }
  
  # Parse database logs
  if [fields][logtype] == "database" {
    json {
      source => "message"
    }
    
    # Extract query information
    if [query] {
      mutate {
        add_field => { "database_query" => "%{query}" }
        add_field => { "database_duration" => "%{duration}" }
      }
    }
  }
  
  # Parse blockchain logs
  if [fields][logtype] == "blockchain" {
    json {
      source => "message"
    }
    
    # Extract blockchain-specific fields
    if [transaction] {
      mutate {
        add_field => { "tx_hash" => "%{[transaction][hash]}" }
        add_field => { "tx_type" => "%{[transaction][type]}" }
        add_field => { "tx_status" => "%{[transaction][status]}" }
        add_field => { "ledger_sequence" => "%{[transaction][ledgerSequence]}" }
      }
    }
    
    if [contract] {
      mutate {
        add_field => { "contract_id" => "%{[contract][id]}" }
        add_field => { "contract_type" => "%{[contract][type]}" }
      }
    }
  }
  
  # Add geographic information if IP is present
  if [clientip] {
    geoip {
      source => "clientip"
      target => "geoip"
    }
  }
  
  # Add user agent parsing
  if [agent] {
    useragent {
      source => "agent"
      target => "user_agent"
    }
  }
  
  # Clean up fields
  mutate {
    remove_field => [ "host", "version", "input", "beat" ]
  }
  
  # Add computed fields
  ruby {
    code => "
      event.set('log_hour', event.get('@timestamp').time.hour)
      event.set('log_date', event.get('@timestamp').time.strftime('%Y-%m-%d'))
    "
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "currentdao-logs-%{+YYYY.MM.dd}"
    template_name => "currentdao-logs"
    template => "/usr/share/logstash/templates/currentdao-logs-template.json"
    template_overwrite => true
    ilm_policy => "currentdao-logs-policy"
    ilm_rollover_alias => "currentdao-logs"
    
    # Performance settings
    flush_size => 500
    idle_flush_time => 1
    
    # Error handling
    retry_on_conflict => 3
    retry_max_interval => 5
    retry_max_items => 500
  }
  
  # Debug output (remove in production)
  if [fields][environment] == "development" {
    stdout {
      codec => rubydebug
    }
  }
}
