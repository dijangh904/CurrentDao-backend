global:
  scrape_interval: 5s # per requirement (every 5 seconds)
  evaluation_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # - "first_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'currentdao-backend'
    static_configs:
      - targets: ['host.docker.internal:9464'] # OTel exporter
    metrics_path: '/metrics'

  - job_name: 'currentdao-apm'
    static_configs:
      - targets: ['host.docker.internal:3000'] # App metrics
    metrics_path: '/metrics'
